spring:
  application:
    name: vibe-csh-service
  datasource:
    url: jdbc:mysql://localhost:3306/vibedb?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  sql:
    init:
      mode: always

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: csh.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

server:
  port: 8081

jwt:
  secret: VibeSecretKeyForJWTTokenGeneration2024VeryLongSecretKey
  expiration: 86400000
