version: '3.8'

services:
  # 后端应用
  backend:
    build:
      context: .
      dockerfile: vibe-csh-service/Dockerfile
    container_name: vibe-service
    restart: always
    network_mode: host
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/vibedb?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 
      TZ: Asia/Shanghai
